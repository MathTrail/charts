# =======================================================================
# mathtrail-service-lib :: values.yaml
# Default values for the library chart.
# The consuming microservice MUST override at least:
#   image.repository, image.tag, resources.requests, resources.limits
# =======================================================================

# -- Replica count (ignored when autoscaling.enabled=true)
replicaCount: 1

# -- Container image
image:
  # repository: ""  # REQUIRED — validated via fail()
  repository: ""
  pullPolicy: Always
  # tag: ""  # Falls back to .Chart.AppVersion if not set
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- ServiceAccount
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# -- Pod annotations and labels
podAnnotations: {}
podLabels: {}

# -- Pod Security Context (pod-level)
podSecurityContext:
  runAsNonRoot: true
  fsGroup: null
  runAsUser: null
  runAsGroup: null

# -- Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: null

# -- Service
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# -- Probe contract (Startup / Liveness / Readiness)
# If the developer does not specify paths, default values are applied.
probes:
  startup:
    path: /health/startup
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 3
  liveness:
    path: /health/liveness
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  readiness:
    path: /health/ready
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3

# -- Resources (MANDATORY — validated via fail())
# Without requests the Kubernetes scheduler cannot place the pod.
# Without limits a single greedy microservice can crash the entire node.
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# -- Migration Job (runs BEFORE the deployment)
# The migration job automatically inherits environment variables from the main deployment's `env` and `envFrom`.
# This eliminates the need to duplicate database connection variables.
# Example:
#   env:  # Shared by both deployment and migration
#     - name: DB_HOST
#       value: "postgres"
#   migration:
#     enabled: true
#     command: ["/migrate"]
#     env: []  # Optional: migration-specific overrides only
migration:
  enabled: false
  command: ["./migrate"]
  args: []
  env: []      # Optional: migration-specific env variables (merged with main `env`)
  envFrom: []  # Optional: migration-specific envFrom (merged with main `envFrom`)
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  restartPolicy: OnFailure
  waitImage: "bitnami/kubectl:latest"
  waitTimeout: "120s"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# -- ConfigMap for environment variables
configMap:
  enabled: false
  data: {}
    # DATABASE_HOST: "postgres"
    # LOG_LEVEL: "info"

# -- Additional environment variables (env)
env: []
  # - name: MY_VAR
  #   value: "my-value"

# -- Additional envFrom (secretRef, configMapRef)
envFrom: []
  # - secretRef:
  #     name: my-secret

# -- Graceful shutdown: delay before SIGTERM (seconds)
preStopDelaySec: 5

# -- Termination grace period (seconds)
terminationGracePeriodSeconds: 30

# -- Default Anti-Affinity: spreads replicas across different nodes
defaultAntiAffinity:
  enabled: true

# -- Additional Affinity rules
affinity: {}

nodeSelector: {}
tolerations: []

# -- Additional volumes / volumeMounts
volumes: []
volumeMounts: []

# -- Schema Registration Job (runs BEFORE the deployment, after migrations)
# Registers Protobuf schemas consumed/produced by this service into Apicurio Registry.
# Each schema subject is rendered as a file in a ConfigMap and registered via
# the Confluent compat v7 API (POST /apis/ccompat/v7/subjects/{subject}/versions).
# HTTP 409 is treated as success (idempotent). Schemas must be self-contained
# (no import directives) — see template comment for references API details.
schemaRegistration:
  enabled: false
  apicurioUrl: ""  # REQUIRED when enabled — e.g. "http://apicurio-registry.streaming.svc:8080"
  hookWeight: "8"  # Runs after db-init (0) and migration (5), before Deployment
  schemas: []
  # schemas:
  #   - subject: "students.v1.StudentOnboardingReady"
  #     # Source: contracts/proto/students/v1/events.proto
  #     proto: |
  #       syntax = "proto3";
  #       package students.v1;
  #       option go_package = "github.com/mathtrail/contracts/gen/go/students/v1;studentsv1";
  #       message StudentOnboardingReady {
  #         string event_id = 1;
  #       }
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  restartPolicy: OnFailure
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# -- RisingWave CDC Job (runs AFTER deployment, post-install/post-upgrade)
# Decentralized CDC pipeline — each service owns its own CDC setup.
# The Job has three steps:
#   1. initContainer: cdc-pg-setup  — creates PUBLICATION + replication slot in source PG
#   2. initContainer: render-sql    — envsubst renders ${ENV_VAR} placeholders in SQL
#   3. main container: risingwave-sql — executes rendered SQL against RisingWave
#
# IMPORTANT: Credentials secrets (pgSource.credentialsSecret, automq.credentialsSecret)
#   must be created in the same namespace as this chart before the Job runs.
#   Typically done via VSO VaultStaticSecret CRs in the service chart.
#
# IDEMPOTENCY: CREATE ... IF NOT EXISTS is safe for SOURCE, TABLE, SINK on every upgrade.
#   CREATE MATERIALIZED VIEW IF NOT EXISTS does NOT support OR REPLACE in RisingWave.
#   If MV definition changes, manually run: DROP MATERIALIZED VIEW <name> CASCADE
#   (this also drops dependent SINKs — recreate them afterwards).
risingwaveCdc:
  enabled: false
  hookWeight: "10"    # post hook — runs after deployment
  pgSource:
    host: ""          # REQUIRED — hostname of the source PostgreSQL instance
    port: "5432"
    database: ""      # REQUIRED — database name
    credentialsSecret: ""   # REQUIRED — K8s Secret name with 'username' and 'password' keys
    slotName: ""      # REQUIRED — logical replication slot name (e.g. "risingwave_cdc")
    publicationName: ""     # REQUIRED — PostgreSQL publication name (e.g. "risingwave_pub")
    tables: []        # REQUIRED — tables included in the publication
    # tables:
    #   - "public.identities"
    #   - "public.identity_verifiable_addresses"
  risingwave:
    host: "risingwave-frontend.streaming.svc.cluster.local"
    port: "4566"
    user: "root"
    database: "dev"
  automq:
    bootstrapServer: ""     # REQUIRED — AutoMQ bootstrap server (e.g. "automq.streaming.svc:9092")
    credentialsSecret: ""   # REQUIRED — K8s Secret name with 'username' and 'password' keys
  apicurioUrl: ""     # REQUIRED — Apicurio URL for ENCODE PROTOBUF schema resolution
  sql: ""             # REQUIRED — Full RisingWave SQL (CREATE SOURCE/TABLE/MV/SINK)
  # sql: |
  #   CREATE SOURCE IF NOT EXISTS my_pg_cdc WITH (
  #       connector = 'postgres-cdc',
  #       hostname  = '${PG_HOST}',
  #       ...
  #   );
  #   CREATE TABLE IF NOT EXISTS my_table (...) FROM my_pg_cdc TABLE 'public.my_table';
  #   CREATE MATERIALIZED VIEW IF NOT EXISTS my_mv AS SELECT ... FROM my_table;
  #   CREATE SINK IF NOT EXISTS my_sink FROM my_mv WITH (
  #       connector = 'kafka',
  #       properties.bootstrap.server = '${AUTOMQ_BOOTSTRAP_SERVER}',
  #       ...
  #   ) FORMAT PLAIN ENCODE PROTOBUF (schema.registry = '${APICURIO_URL}', message = '...');
  backoffLimit: 10
  ttlSecondsAfterFinished: 1800
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# -- HPA / Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 0
