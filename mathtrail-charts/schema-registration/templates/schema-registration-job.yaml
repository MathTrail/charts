{{/*
=======================================================================
  schema-registration :: schema-registration-job.yaml
  Registers Protobuf schemas into Apicurio Registry via Confluent compat v7 API.

  Step 1 — initContainer: wait-apicurio
    Polls Apicurio /apis/registry/v3/system/info until ready.

  Step 2 — main container: register-schemas
    For each .proto file mounted from the ConfigMap, POSTs to
    /apis/ccompat/v7/subjects/{subject}/versions.
    HTTP 200 = registered, 409 = already exists — both treated as success.

  Idempotency:
    HTTP 409 (schema already exists) is treated as success — safe on every upgrade.
    If a schema definition changes, delete the subject in Apicurio first.
=======================================================================
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "schema-registration.fullname" . }}-schema-protos
  labels:
    {{- include "schema-registration.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema-registration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation
data:
{{- range .Values.schemas }}
  # Source: contracts/proto/{{ .subject | replace "." "/" }}.proto
  {{ .subject }}.proto: |
{{ .proto | indent 4 -}}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "schema-registration.fullname" . }}-schema-registration
  labels:
    {{- include "schema-registration.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema-registration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "schema-registration.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: schema-registration
    spec:
      restartPolicy: {{ .Values.restartPolicy }}
      initContainers:
        # Wait for Apicurio to be ready before attempting registration.
        - name: wait-apicurio
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              echo "Waiting for Apicurio Registry..."
              i=0
              until curl -sf "${APICURIO_URL}/apis/registry/v3/system/info" >/dev/null; do
                i=$((i+1))
                if [ "$i" -ge 20 ]; then
                  echo "Apicurio not ready after 60s, giving up." >&2
                  exit 1
                fi
                echo "  not ready, retrying in 3s... ($i/20)"
                sleep 3
              done
              echo "Apicurio is ready."
          env:
            - name: APICURIO_URL
              value: {{ .Values.apicurioUrl | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100  # curlimages/curl uses non-numeric 'curl_user' (UID 100); numeric UID required for runAsNonRoot verification
      containers:
        - name: register-schemas
          # alpine: apk adds curl + jq at runtime.
          # jq --rawfile safely escapes multiline .proto content into JSON
          # without manual quoting — avoids escaping "minefield".
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl jq >/dev/null 2>&1

              # register_proto_schema: idempotent registration via Confluent compat v7 API.
              # HTTP 200 = registered, 409 = already exists — both are success.
              register_proto_schema() {
                local subject="$1"
                local proto_file="$2"
                echo "Registering subject: $subject"
                local body
                body=$(jq -n --rawfile schema "$proto_file" \
                  '{"schemaType": "PROTOBUF", "schema": $schema}')
                local http_code
                http_code=$(curl -s -o /tmp/apicurio_response.json -w "%{http_code}" \
                  -X POST \
                  -H "Content-Type: application/vnd.schemaregistry.v1+json" \
                  --data "$body" \
                  "${APICURIO_URL}/apis/ccompat/v7/subjects/${subject}/versions")
                if [ "$http_code" = "200" ]; then
                  echo "  -> registered, id=$(jq -r '.id // "unknown"' /tmp/apicurio_response.json)"
                elif [ "$http_code" = "409" ]; then
                  echo "  -> already exists (idempotent)"
                else
                  echo "  ERROR: HTTP $http_code for $subject" >&2
                  cat /tmp/apicurio_response.json >&2
                  exit 1
                fi
              }

              for f in /schemas/*.proto; do
                SUBJECT=$(basename "$f" .proto)
                register_proto_schema "$SUBJECT" "$f"
              done

              echo "All schemas registered successfully."
          env:
            - name: APICURIO_URL
              value: {{ .Values.apicurioUrl | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: schemas
              mountPath: /schemas
      volumes:
        - name: schemas
          configMap:
            name: {{ include "schema-registration.fullname" . }}-schema-protos
