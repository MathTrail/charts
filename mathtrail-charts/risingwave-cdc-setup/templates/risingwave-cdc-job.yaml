{{/*
=======================================================================
  risingwave-cdc-setup :: risingwave-cdc-job.yaml
  Sets up a RisingWave CDC pipeline from a PostgreSQL source.

  Step 1 — initContainer: cdc-pg-setup
    Connects to the source PostgreSQL database and idempotently creates:
      • PUBLICATION covering the tables listed in pgSource.tables
      • Logical replication slot with pgoutput decoder
    Both are guarded by IF NOT EXISTS / EXCEPTION WHEN duplicate_object checks.

  Step 2 — initContainer: render-sql
    Runs envsubst with an explicit variable list to render ${ENV_VAR}
    placeholders in the SQL. The explicit list prevents envsubst from
    corrupting PostgreSQL $$ dollar-quote syntax used in future SQL blocks.

  Step 3 — main container: risingwave-sql
    Waits for the RisingWave frontend to be ready, then executes the
    rendered SQL (CREATE SOURCE / TABLE / MATERIALIZED VIEW / SINK).

  Idempotency:
    • CREATE SOURCE/TABLE/SINK IF NOT EXISTS — safe on every upgrade.
    • CREATE MATERIALIZED VIEW IF NOT EXISTS — safe, but NOT replaceable.
      If the MV definition changes, a manual DROP MATERIALIZED VIEW ... CASCADE
      is required first (which also drops dependent SINKs).

  Credentials:
    This chart references K8s Secrets by name only — it does not create them.
    The deploying service is responsible for provisioning:
      • pgSource.credentialsSecret  — Secret with 'username' and 'password' keys
      • automq.credentialsSecret    — Secret with 'username' and 'password' keys
=======================================================================
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "risingwave-cdc-setup.fullname" . }}-rw-cdc-sql
  labels:
    {{- include "risingwave-cdc-setup.labels" . | nindent 4 }}
    app.kubernetes.io/component: risingwave-cdc
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": {{ .Values.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  setup.sql: |
{{ .Values.sql | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "risingwave-cdc-setup.fullname" . }}-rw-cdc-setup
  labels:
    {{- include "risingwave-cdc-setup.labels" . | nindent 4 }}
    app.kubernetes.io/component: risingwave-cdc
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": {{ .Values.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "risingwave-cdc-setup.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: risingwave-cdc
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Step 1: Create PostgreSQL publication and replication slot (idempotent).
        - name: cdc-pg-setup
          image: {{ .Values.pgClientImage }}
          env:
            - name: PGHOST
              value: {{ .Values.pgSource.host | quote }}
            - name: PGPORT
              value: {{ .Values.pgSource.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.pgSource.database | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgSource.credentialsSecret | quote }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgSource.credentialsSecret | quote }}
                  key: password
          command:
            - bash
            - -c
            - |
              set -e

              echo "Creating PostgreSQL publication for RisingWave CDC..."
              psql -c "
                DO \$\$
                BEGIN
                  CREATE PUBLICATION {{ .Values.pgSource.publicationName }}
                    FOR TABLE {{ join ", " .Values.pgSource.tables }};
                EXCEPTION
                  WHEN duplicate_object THEN
                    RAISE NOTICE 'Publication already exists, skipping.';
                END
                \$\$;
              "

              echo "Creating replication slot..."
              psql -c "
                SELECT CASE
                  WHEN NOT EXISTS (
                    SELECT 1 FROM pg_replication_slots
                    WHERE slot_name = '{{ .Values.pgSource.slotName }}'
                  )
                  THEN pg_create_logical_replication_slot(
                    '{{ .Values.pgSource.slotName }}', 'pgoutput'
                  )
                  ELSE NULL
                END;
              "

              echo "CDC PG setup complete."
              echo "  Publication : {{ .Values.pgSource.publicationName }}"
              echo "  Slot        : {{ .Values.pgSource.slotName }}"

        # Step 2: Render ${ENV_VAR} placeholders in the SQL using envsubst.
        # Explicit variable list prevents envsubst from substituting $$ used in
        # PostgreSQL dollar-quote blocks (if any future SQL uses them).
        - name: render-sql
          image: alpine:3.20
          env:
            - name: PG_HOST
              value: {{ .Values.pgSource.host | quote }}
            - name: PG_PORT
              value: {{ .Values.pgSource.port | quote }}
            - name: PG_DATABASE
              value: {{ .Values.pgSource.database | quote }}
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgSource.credentialsSecret | quote }}
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgSource.credentialsSecret | quote }}
                  key: password
            - name: AUTOMQ_BOOTSTRAP_SERVER
              value: {{ .Values.automq.bootstrapServer | quote }}
            - name: AUTOMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.automq.credentialsSecret | quote }}
                  key: username
            - name: AUTOMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.automq.credentialsSecret | quote }}
                  key: password
            - name: APICURIO_URL
              value: {{ .Values.apicurioUrl | quote }}
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext >/dev/null 2>&1
              envsubst '$PG_HOST $PG_PORT $PG_DATABASE $PG_USER $PG_PASSWORD $AUTOMQ_BOOTSTRAP_SERVER $AUTOMQ_USERNAME $AUTOMQ_PASSWORD $APICURIO_URL' \
                < /sql-template/setup.sql > /sql-rendered/setup.sql
              echo "SQL rendered successfully."
          volumeMounts:
            - name: sql-template
              mountPath: /sql-template
            - name: sql-rendered
              mountPath: /sql-rendered

      containers:
        # Step 3: Wait for RisingWave and execute the rendered SQL.
        - name: risingwave-sql
          # postgres image provides psql client; RisingWave speaks the Postgres wire protocol.
          image: {{ .Values.pgClientImage }}
          env:
            - name: RW_HOST
              value: {{ .Values.risingwave.host | quote }}
            - name: RW_PORT
              value: {{ .Values.risingwave.port | quote }}
            - name: RW_USER
              value: {{ .Values.risingwave.user | quote }}
            - name: RW_DATABASE
              value: {{ .Values.risingwave.database | quote }}
            - name: PGPASSWORD
              value: ""  # RisingWave has no password in dev mode
          command:
            - bash
            - -c
            - |
              set -e
              echo "Waiting for RisingWave frontend to be ready..."
              until psql -h "$RW_HOST" -p "$RW_PORT" -U "$RW_USER" -d "$RW_DATABASE" \
                -c "SELECT 1" > /dev/null 2>&1; do
                echo "  RisingWave not ready, retrying in 5s..."
                sleep 5
              done

              echo "Executing RisingWave CDC SQL setup..."
              psql -h "$RW_HOST" -p "$RW_PORT" -U "$RW_USER" -d "$RW_DATABASE" \
                -f /sql-rendered/setup.sql

              echo "RisingWave CDC setup complete."
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: sql-rendered
              mountPath: /sql-rendered

      volumes:
        - name: sql-template
          configMap:
            name: {{ include "risingwave-cdc-setup.fullname" . }}-rw-cdc-sql
        - name: sql-rendered
          emptyDir: {}
